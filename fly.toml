app = "radar-bc-bot"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT     = "3000"

[http_service]
  internal_port        = 3000
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    timeout      = "10s"

[[vm]]
  memory   = "1gb"
  cpu_kind = "shared"
  cpus     = 1
