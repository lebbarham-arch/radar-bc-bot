app = "radar-bc-bot"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT     = "3000"

[[services]]
  internal_port = 3000
  protocol      = "tcp"

  [[services.ports]]
    handlers    = ["http"]
    port        = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port     = 443

  [[services.http_checks]]
    grace_period = "30s"
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    timeout      = "10s"

[[vm]]
  memory   = "1gb"
  cpu_kind = "shared"
  cpus     = 1
